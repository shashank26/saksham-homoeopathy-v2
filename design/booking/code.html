<script>
        // Simple Interaction logic for slot selection
        document.querySelectorAll('section .grid button, section .flex button').forEach(btn => {
            btn.addEventListener('click', function() {
                // Determine siblings based on parent
                const siblings = this.parentElement.querySelectorAll('button');
                siblings.forEach(s => {
                    s.classList.remove('bg-primary-container', 'text-white', 'border-secondary', 'text-secondary', 'bg-secondary-container/10', 'border-2');
                    s.classList.add('border-outline-variant', 'text-on-surface');
                });
                
                // Toggle active state
                this.classList.remove('border-outline-variant', 'text-on-surface');
                if (this.parentElement.classList.contains('grid')) {
                    this.classList.add('border-2', 'border-secondary', 'text-secondary', 'bg-secondary-container/10');
                } else {
                    this.classList.add('bg-primary-container', 'text-white');
                }
            });
        });

        // Form focus visual feedback
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.querySelector('label').classList.add('text-primary');
            });
            el.addEventListener('blur', () => {
                el.parentElement.querySelector('label').classList.remove('text-primary');
            });
        });
    </script>
